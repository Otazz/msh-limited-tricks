<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSH Limited Tricks — Instant &amp; Flash Trainer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>MSH Limited Tricks</h1>
  <p class="subtitle">Anki-style trainer for every Instant and Flash card in Marvel Super Heroes limited</p>
  <button id="settings-toggle" class="icon-btn" title="Filters &amp; data">⚙</button>
</header>

<section id="settings-panel" class="hidden">
  <div class="filter-group">
    <span class="filter-label">Colors</span>
    <label><input type="checkbox" class="color-filter" value="W" checked>W</label>
    <label><input type="checkbox" class="color-filter" value="U" checked>U</label>
    <label><input type="checkbox" class="color-filter" value="B" checked>B</label>
    <label><input type="checkbox" class="color-filter" value="R" checked>R</label>
    <label><input type="checkbox" class="color-filter" value="G" checked>G</label>
    <label><input type="checkbox" class="color-filter" value="C" checked>Colorless/Multi</label>
  </div>
  <div class="filter-group">
    <span class="filter-label">Card kind</span>
    <label><input type="checkbox" id="kind-instant" checked>Instants</label>
    <label><input type="checkbox" id="kind-flash" checked>Flash permanents</label>
  </div>
  <div class="filter-group">
    <span class="filter-label">Data</span>
    <button id="export-btn">Export progress</button>
    <button id="import-btn">Import progress</button>
    <input type="file" id="import-file" accept="application/json" class="hidden">
    <button id="reset-btn" class="danger">Reset all progress</button>
  </div>
</section>

<main>
  <div id="stats-bar">
    <span><strong id="stat-due">0</strong> due</span>
    <span><strong id="stat-new">0</strong> new</span>
    <span><strong id="stat-total">0</strong> in filter</span>
  </div>

  <div id="empty-state" class="hidden">
    <p>Nothing to review right now with the current filters. Check your filters, or come back later.</p>
  </div>

  <div id="card-area" class="hidden">
    <div id="card">
      <div id="card-front">
        <div id="front-mana" class="mana-cost"></div>
        <div id="front-name"></div>
        <div id="front-type"></div>
        <button id="show-answer-btn">Show answer (Space)</button>
      </div>
      <div id="card-back" class="hidden">
        <div id="back-images"></div>
        <div id="back-oracle"></div>
        <a id="back-scryfall-link" target="_blank" rel="noopener">View on Scryfall ↗</a>
      </div>
    </div>

    <div id="rating-bar" class="hidden">
      <button class="rate-btn" data-rating="again">Again<small id="preview-again"></small></button>
      <button class="rate-btn" data-rating="hard">Hard<small id="preview-hard"></small></button>
      <button class="rate-btn" data-rating="good">Good<small id="preview-good"></small></button>
      <button class="rate-btn" data-rating="easy">Easy<small id="preview-easy"></small></button>
    </div>
  </div>
</main>

<script src="js/srs.js"></script>
<script src="js/app.js"></script>
</body>
</html>
