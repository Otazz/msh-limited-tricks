name: Refresh card data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch cards
        run: python scripts/fetch_cards.py

      - name: Check for changes
        id: git-diff
        run: |
          if git diff --quiet -- data/cards.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.git-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: Refresh card data from Scryfall
          branch: data-refresh/scryfall-sync
          title: Refresh card data from Scryfall
          body: |
            Automated data refresh generated by the scheduled `refresh-cards` workflow.

            Please review the diff in `data/cards.json` before merging, as changes may reflect real Scryfall errata or new variant prints.
          add-paths: data/cards.json
